version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: reality_hits_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DB: reality_hits
    volumes:
      - mongo_data:/data/db
    networks:
      - reality_hits_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reality_hits_backend
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017/reality_hits
      MONGO_DB_NAME: reality_hits
      LM_STUDIO_API_URL: http://host.docker.internal:1234/v1/chat/completions
      DEBUG: "True"
      JWT_SECRET: local-compose-secret-change-before-production
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      ADMIN_EMAIL: admin@citizenvoice.in
      ADMIN_PASSWORD: local-admin-password-123
      ADMIN_FULL_NAME: Local Administrator
    depends_on:
      - mongodb
    networks:
      - reality_hits_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: reality_hits_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - reality_hits_network

volumes:
  mongo_data:

networks:
  reality_hits_network:
    driver: bridge
